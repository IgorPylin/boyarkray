# «Боярский Край» — статический сайт в контейнере nginx.
#
# Текущий режим: доступ по порту http://<IP_СЕРВЕРА>:8080
# (Traefik и проект bbmarket не затрагиваются).
#
# Когда появится домен — раскомментируйте блок Traefik внизу,
# уберите секцию ports и пересоздайте контейнер (см. README.md).

services:
  boyarskiy-kray:
    image: nginx:alpine
    container_name: boyarskiy-kray
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./site:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

    # --- ВАРИАНТ С ДОМЕНОМ ЧЕРЕЗ TRAEFIK (включить позже) ---
    # Уберите секцию "ports" выше и раскомментируйте всё ниже,
    # подставив имя сети и certresolver из вашего bbmarket-проекта.
    #
    # networks:
    #   - TRAEFIK_NETWORK            # имя внешней сети Traefik
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.docker.network=TRAEFIK_NETWORK"
    #   - "traefik.http.routers.boyar.rule=Host(`boyarskiy-kray.ru`)"
    #   - "traefik.http.routers.boyar.entrypoints=websecure"
    #   - "traefik.http.routers.boyar.tls.certresolver=RESOLVER_NAME"
    #   - "traefik.http.services.boyar.loadbalancer.server.port=80"
    #   # http -> https
    #   - "traefik.http.routers.boyar-http.rule=Host(`boyarskiy-kray.ru`)"
    #   - "traefik.http.routers.boyar-http.entrypoints=web"
    #   - "traefik.http.routers.boyar-http.middlewares=boyar-redirect"
    #   - "traefik.http.middlewares.boyar-redirect.redirectscheme.scheme=https"

# networks:
#   TRAEFIK_NETWORK:
#     external: true
