# nginx-конфиг для статического сайта «Боярский Край»
# Путь на сервере: /etc/nginx/sites-available/boyarskiy-kray.conf
# __DOMAIN__ заменяется скриптом deploy/setup-server.sh (или вручную).
# Если домена пока нет — оставьте server_name _; и сайт будет открываться по IP.

server {
    listen 80;
    listen [::]:80;

    server_name __DOMAIN__;

    root /var/www/boyarskiy-kray;
    index index.html;

    # Безопасность
    server_tokens off;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Сжатие
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # Кэширование статических ассетов
    location ~* \.(?:css|js|svg|jpg|jpeg|png|webp|avif|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # HTML — без агрессивного кэша, чтобы обновления были видны сразу
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }
}
